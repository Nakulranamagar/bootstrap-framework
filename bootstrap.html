<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bootstrap Demo</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: linear-gradient(135deg, #f5f7fa, #c3cfe2);
    font-family: Arial, sans-serif;
}

.navbar {
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}

.card {
    border: none;
    border-radius: 15px;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
}

.card:hover {
    transform: translateY(-10px);
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

.card-body {
    padding: 30px;
    text-align: center;
}

h1 {
    font-weight: bold;
    color: #333;
}

.btn {
    border-radius: 30px;
    padding: 8px 20px;
}

form {
    background: white;
    padding: 30px;
    border-radius: 15px;
    box-shadow: 0 10px 20px rgba(0,0,0,0.1);
}
</style>

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
<div class="container">
    <a class="navbar-brand fw-bold" href="#">Bootstrap Portfolio</a>
</div>
</nav>

<div class="container mt-5">

<h1 class="text-center mb-4">Bootstrap Demonstration</h1>

<div class="row g-4">

<div class="col-md-4">
<div class="card shadow-sm">
<div class="card-body">
<h3>HTML</h3>
<p>Structure of webpages using semantic elements.</p>
<button class="btn btn-primary">Learn More</button>
</div>
</div>
</div>

<div class="col-md-4">
<div class="card shadow-sm">
<div class="card-body">
<h3>CSS</h3>
<p>Used for styling and designing beautiful websites.</p>
<button class="btn btn-success">Learn More</button>
</div>
</div>
</div>

<div class="col-md-4">
<div class="card shadow-sm">
<div class="card-body">
<h3>JavaScript</h3>
<p>Used to make websites interactive and dynamic.</p>
<button class="btn btn-danger">Learn More</button>
</div>
</div>
</div>

</div>

<h2 class="mt-5 mb-3 text-center">Contact Form</h2>

<form class="mx-auto" style="max-width: 500px;">
    <input type="text" class="form-control mb-3" placeholder="Enter Name">
    <input type="email" class="form-control mb-3" placeholder="Enter Email">
    <textarea class="form-control mb-3" rows="4" placeholder="Your Message"></textarea>
    <button class="btn btn-primary w-100">Submit</button>
</form>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
